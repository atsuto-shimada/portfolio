<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT</title>
  <link rel="icon" type="image/webp" href="images/%E3%81%82%E3%81%A4%E3%81%A8%E3%83%AD%E3%82%B4.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Host+Grotesk:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="contact.css">
</head>
<body>
  <nav class="sub-nav">
    <a href="index.html">HOME</a>
    <a href="profile.html">PROFILE</a>
    <a href="works.html">WORKS</a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLScGWggfx-XI5iAqtZNB_iRvf7DIoArWMKtYYxsC5hBf22Harw/viewform?usp=header" target="_blank" rel="noopener">CONTACT</a>
  </nav>

  <main class="contact-wrap">

    <form class="contact-form" id="contact-form" novalidate>
      <div class="field-row">
        <label for="name">NAME</label>
        <input type="text" id="name" name="name" autocomplete="name">
      </div>
      <div class="field-row">
        <label for="email">EMAIL</label>
        <input type="email" id="email" name="email" autocomplete="email">
      </div>
      <div class="field-row field-row--message">
        <label for="message">MESSAGE</label>
        <textarea id="message" name="message" rows="6"></textarea>
      </div>
      <div class="field-row field-row--submit">
        <span></span>
        <button type="submit" class="send-btn">SEND</button>
      </div>
    </form>

    <div class="thankyou" id="thankyou" hidden>
      <p class="thankyou-text">THANK YOU</p>
    </div>

  </main>
  <script src="contact.js"></script>
</body>
</html>
