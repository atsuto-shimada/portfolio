<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しまだあつとを知ろう</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Host+Grotesk:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loader">
    <span id="loader-pct">0%</span>
    <span id="loader-complete">COMPLETE</span>
    <span id="loader-hint"></span>
    <input id="loader-input" type="tel" inputmode="numeric" autocomplete="off">
  </div>

<div class="container">
    <span class="text"><span class="ch" data-action="invert">し</span><span class="ch" data-action="round">ま</span><span class="ch" data-action="xmarks">だ</span><span class="ch" data-action="music">あ</span><span class="ch" data-action="crush">つ</span><span class="ch" data-action="freeze">と</span>を知ろう</span>
  </div>
  <script src="loader.js"></script>
  <script src="main.js"></script>
</body>
</html>
